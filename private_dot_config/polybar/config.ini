[colors]
background = #08052b
background-alt = #373B41
foreground = #FFFFFF
primary = #81B1CE
; primary = #19ffa8
secondary = #8ABEB7
alert = #A54242
disabled = #707880
 rosewater = #f5e0dc
 flamingo = #f2cdcd
 pink = #f5c2e7
 mauve = #cba6f7
 red = #f38ba8
 maroon = #eba0ac
 peach = #fab387
 yellow = #f9e2af
 green = #a6e3a1
 teal = #94e2d5
 sky = #89dceb
 sapphire = #74c7ec
 blue = #89b4fa
 lavender = #b4befe
 text = #cdd6f4
 subtext1 = #bac2de
 subtext0 = #a6adc8
 overlay2 = #9399b2
 overlay1 = #7f849c
 overlay0 = #6c7086
 surface2 = #585b70
 surface1 = #45475a
 surface0 = #313244
 base = #1e1e2e
 mantle = #181825
 crust = #11111b
 transparent = #FF00000

[global/wm]
margin-top = 0

[bar/mybar]
width = 100%
height = 18pt
radius = 0

margin-top = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMonoNerdFont:pixelsize=12;2

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio memory cpu battery wlan powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄ®  "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "ÓĽ® "
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ  "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
; format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = ůį§®  %{F#C5C8C6}%essid%
label-connected-foreground = ${colors.primary}
; format-packetloss = <animation-packetloss> <label-connected>
; format-connected = <ramp-signal>
; format-packetloss = <animation-packetloss>
label-disconnected = "ůį§ģ"
label-disconnected-foreground = ${colors.primary}

ramp-signal-0 = "ůį§Į"
ramp-signal-1 = "ůį§ü"
ramp-signal-2 = "ůį§Ę"
ramp-signal-3 = "ůį§•"
ramp-signal-4 = "ůį§®"

animation-packetloss-0 = "ůį§Į"
animation-packetloss-1 = "ůį§ü"
animation-packetloss-2 = "ůį§Ę"
animation-packetloss-3 = "ůį§•"
animation-packetloss-4 = "ůį§®"

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
low-at = 20
format-prefix = "BATTERY "
format-prefix-foreground = ${colors.primary}
format-charging = <animation-charging> <label-charging>
format-charging-underline = #19ffa8
format-background = ${colors.background}

format-discharging = <ramp-capacity> <label-discharging>
; format-discharging-underline = #0af

# format-low = <animation-charging> <label-charging>
format-low-underline = #fa1331

format-full-prefix = "ůįĀĻ "
; format-full-prefix-foreground = ${colors.foreground-alt}
; format-full-underline = ${self.format-charging-underline}

ramp-capacity-0 = ůįāé
ramp-capacity-1 = ůįĀĽ
ramp-capacity-2 = ůįĀĺ
ramp-capacity-3 = ůįāÄ
ramp-capacity-4 = ůįāā
ramp-capacity-5 = ůįĀĻ
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = ůįĘú
animation-charging-1 = ůįāÜ
animation-charging-2 = ůįĘĚ
animation-charging-3 = ůįĘě
animation-charging-4 = ůįāč
animation-charging-5 = ůįāĄ
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d %I:%M %p
date-alt = %Y-%m-%d %I:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/powermenu]
type = custom/menu
expand-right = true
format-spacing = 1
label-open = "ůįüĄ"
label-open-foreground = ${colors.secondary}
label-close = ůįüÉ cancel
label-close-foreground = ${colors.primary}
label-separator = |
label-separator-foreground = ${colors.foreground-alt}

menu-0-0 = Reboot
menu-0-0-exec = reboot
menu-0-1 = Shutdown
menu-0-1-exec = poweroff
menu-0-2 = Logout
menu-0-2-exec = i3-msg exit
menu-1-0 = Cancel
menu-1-0-exec = menu-open-0
