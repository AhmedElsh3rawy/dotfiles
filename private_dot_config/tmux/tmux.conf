set-option -sa terminal-overrides ",xterm*:Tc"

# make C-Space prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# mouse on
set -g mouse on

# make excape time 0
set -s escape-time 0

# open in cwd
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# set vi-mode
set-window-option -g mode-keys vi

# Vim style pane selection
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R


# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-bg '#1e1e2e'  #'#89b4fa'
set -g status-fg '#89b4fa'  #'#f9e3af'

set -g status-right ""


# lunch lazygit in popup pane
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# lunch lazydocker in popup pane
bind -r d display-popup -d '#{pane_current_path}' -w80% -h80% -E lazydocker
